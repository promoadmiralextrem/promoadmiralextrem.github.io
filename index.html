<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrusel 1920x1080</title>

<style>
html, body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#001c4c;
overflow:hidden;
}

/* contenedor fijo pantalla completa */
#slides{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

/* imágenes */
.slide{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover; /* llena pantalla */
opacity:0;
transition:opacity 1s ease-in-out;
}

/* activa */
.slide.active{
opacity:1;
}
</style>
</head>

<body>

<div id="slides"></div>

<script>

const slidesContainer = document.getElementById("slides")
const limite = 12        // número máximo de imágenes
const tiempo = 10000      // tiempo entre slides
let slides = []
let index = 0

/* PRECARGAR TODAS LAS IMÁGENES PRIMERO */
function preloadImagenes(callback){

let cargadas = 0

for(let i = 1; i <= limite; i++){

const img = new Image()
img.src = i + ".jpg?v=" + Date.now();
img.className = "slide"

img.onload = function(){
slidesContainer.appendChild(img)
cargadas++

if(cargadas === limite){
slides = document.querySelectorAll(".slide")
slides[0].classList.add("active")
callback()
}
}

img.onerror = function(){
cargadas++
if(cargadas === limite){
slides = document.querySelectorAll(".slide")
if(slides.length > 0){
slides[0].classList.add("active")
callback()
}
}
}

}

}

function iniciarCarrusel(){
setInterval(() => {

slides[index].classList.remove("active")
index = (index + 1) % slides.length
slides[index].classList.add("active")

}, tiempo)
}

preloadImagenes(iniciarCarrusel)

</script>

</body>
</html>
